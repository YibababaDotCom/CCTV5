name: Fetch M3U8 Link

on:
  schedule:
    - cron: '0 * * * *' # Runs hourly
  workflow_dispatch:

jobs:
  fetch-and-save:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare output directory
        run: mkdir -p output

      - name: Fetch webpage source with error handling
        run: |
          set -x
          WEB_URL="https://huaren.live/viv/detail/id/536/nid/1.html"
          echo "Fetching source from $WEB_URL..."
          SOURCE_CODE=$(curl -s --fail "$WEB_URL") || {
            echo "❌ Failed to fetch webpage."
            exit 1
          }
          echo "${SOURCE_CODE:0:500}" > output/debug.log
          echo "$SOURCE_CODE" > output/webpage_source.html

      - name: Extract M3U8 link
        run: |
          set -x
          echo "Extracting M3U8 link from source..."
          EXTRACTED_M3U8=$(grep -oP "https:\/\/[^'\"]+\.m3u8\?auth=[^'\"]+" output/webpage_source.html)

          if [ -z "$EXTRACTED_M3U8" ]; then
            echo "❌ M3U8 link not found."
            exit 1
          fi

          echo "✅ M3U8 link: $EXTRACTED_M3U8"

          cat <<EOF > output/latest.m3u8
#EXTM3U
#EXT-X-VERSION:3
#EXT-X-STREAM-INF:BANDWIDTH=500000
$EXTRACTED_M3U8
EOF

      - name: Commit and push M3U8 file
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -x
          git config user.name "GitHub Actions"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/latest.m3u8
          git commit -m "🔁 Update M3U8 link"
          git push
